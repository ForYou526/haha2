<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For You 💖</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI',sans-serif;
}

body{
height:100vh;
overflow:hidden;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(to top,#87CEEB,#cdefff,#ffffff);
transition:2s;
cursor:pointer;
}

/* TEXT */
.text{
position:absolute;
color:white;
font-size:28px;
font-weight:bold;
text-align:center;
padding:20px;
text-shadow:0 0 15px rgba(0,0,0,0.4);
max-width:90%;
}

/* TYPEWRITER */
.cursor{
display:inline-block;
width:3px;
background:white;
margin-left:5px;
animation:blink 1s infinite;
}

@keyframes blink{
0%,50%,100%{opacity:1;}
25%,75%{opacity:0;}
}

/* CLOUDS */
.cloud{
position:absolute;
background:white;
border-radius:50%;
opacity:.9;
}

.cloud:before,
.cloud:after{
content:'';
position:absolute;
background:white;
border-radius:50%;
}

@keyframes float{
from{transform:translateX(-200px);}
to{transform:translateX(120vw);}
}

/* STARS */
.star{
position:absolute;
width:2px;
height:2px;
background:white;
border-radius:50%;
animation:twinkle 2s infinite alternate;
}

@keyframes twinkle{
from{opacity:.3;}
to{opacity:1;}
}

/* MOON */
.moon{
position:absolute;
top:50px;
right:80px;
width:120px;
height:120px;
background:radial-gradient(circle,#fff,#fdf6e3,#f5e6c8);
border-radius:50%;
box-shadow:0 0 40px 15px rgba(255,255,200,.7);
}

/* HEART */
.big-heart{
position:absolute;
font-size:120px;
animation:pop 1s forwards, pulse 1.5s infinite;
opacity:0;
filter:drop-shadow(0 0 25px pink);
}

@keyframes pop{
to{opacity:1; transform:scale(1.3);}
}

@keyframes pulse{
0%,100%{transform:scale(1.3);}
50%{transform:scale(1.5);}
}

.golden{
background:linear-gradient(to top,#ffb347,#ffcc33,#ffe29f);
}

</style>
</head>
<body>

<div class="moon"></div>
<div id="text" class="text"></div>

<script>

const messages = [
"Hey kamu ❤️ tap tap aja ya",
"pencet",
"pencet lagi",
"ayoo sayang",
"ini aja deh",
"hmm",
"aku mau ngomong sesuatu nih",
"coba pencet lagi",
"semangat mencetnyaa",
"ini terakhir",
"serius",
"ini",
"terakhir",
"tapi boong yahahahaha",
"aku tau kamu pasti kesel",
"hmmm",
"yaudah deh",
"padahal",
"aku cuman mau bilang...",
"orang orang naek motor",
"I LOVEEE YOUUU SAYANGKUUU 💖"
];

let index = 0;
const text = document.getElementById("text");

/* TYPE EFFECT */
function typeWriter(message, callback){
let i = 0;
text.innerHTML = "";
let cursor = document.createElement("span");
cursor.className="cursor";

function typing(){
if(i < message.length){
text.innerHTML = message.substring(0,i+1);
text.appendChild(cursor);
i++;
setTimeout(typing,40);
}else{
if(callback) callback();
}
}
typing();
}

document.body.addEventListener("click",function(e){

if(index < messages.length){
text.style.left = e.clientX + "px";
text.style.top = e.clientY + "px";
typeWriter(messages[index]);
index++;
}else{
showHeart();
}
});

function showHeart(){
document.body.classList.add("golden");
text.style.display="none";

let heart=document.createElement("div");
heart.className="big-heart";
heart.innerHTML="💖";
heart.style.left="50%";
heart.style.top="40%";
heart.style.transform="translate(-50%,-50%)";
document.body.appendChild(heart);

let finalText=document.createElement("div");
finalText.className="text";
finalText.innerHTML="nihh cintakuu ambil aja semuanya 💛";
finalText.style.top="65%";
finalText.style.left="50%";
finalText.style.transform="translateX(-50%)";
document.body.appendChild(finalText);
}

/* CLOUDS MANY */
for(let i=0;i<35;i++){
let cloud=document.createElement("div");
cloud.className="cloud";

let size=60+Math.random()*100;
cloud.style.width=size+"px";
cloud.style.height=size+"px";
cloud.style.top=Math.random()*100+"vh";
cloud.style.left=Math.random()*100+"vw";
cloud.style.animation=`float ${25+Math.random()*20}s linear infinite`;

document.body.appendChild(cloud);
}

/* STARS */
for(let i=0;i<80;i++){
let star=document.createElement("div");
star.className="star";
star.style.top=Math.random()*100+"vh";
star.style.left=Math.random()*100+"vw";
star.style.animationDuration=1+Math.random()*2+"s";
document.body.appendChild(star);
}

typeWriter(messages[0]);
index++;

</script>

</body>
</html>
